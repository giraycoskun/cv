name: Notify website repo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cv_long_*.pdf"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger giraycoskun-com sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_REPO_TOKEN }}" \
            https://api.github.com/repos/giraycoskun/giraycoskun-com/dispatches \
            -d '{"event_type":"cv-updated"}'
