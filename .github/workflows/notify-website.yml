name: Notify website repo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cv_long_*.pdf"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      SITE_REPO_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
      TARGET_REPO: giraycoskun/giraycoskun.com
      TARGET_WORKFLOW: update-cv.yml
      TARGET_REF: main
    steps:
      - name: Trigger website sync via workflow_dispatch
        run: |
          if [ -z "$SITE_REPO_TOKEN" ]; then
            echo "SITE_REPO_TOKEN is empty or not configured."
            exit 1
          fi

          http_code=$(curl -sS -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $SITE_REPO_TOKEN" \
            "https://api.github.com/repos/$TARGET_REPO/actions/workflows/$TARGET_WORKFLOW/dispatches" \
            -d "{\"ref\":\"$TARGET_REF\"}")

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "workflow_dispatch failed with HTTP $http_code"
            cat /tmp/dispatch_response.json
            exit 1
          fi

          echo "workflow_dispatch sent to $TARGET_REPO ($TARGET_WORKFLOW on $TARGET_REF)"
